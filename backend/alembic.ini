# ─── Alembic Configuration File ───────────────────────────────────────────────
# This file is read by alembic CLI commands
# The actual database URL is injected from .env in env.py
# So the sqlalchemy.url here is intentionally left as a placeholder

[alembic]
# Path to migration scripts
script_location = alembic

# Template for migration file names
# Format: YYYY-MM-DD_HH-MM-SS_<revision>_<slug>
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Prepend sys.path with this directory so app imports work
prepend_sys_path = .

# Timezone for migration file timestamps
timezone = UTC

# Max length of slug in migration filename
truncate_slug_length = 40

# Leave this blank — URL is loaded dynamically from .env in env.py
sqlalchemy.url =

# ─── Logging ──────────────────────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S